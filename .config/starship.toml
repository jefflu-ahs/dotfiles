format = """
[в•ӯ](fg:current_line)\
$os\
$directory\
$git_branch\
$git_status\
$fill\
$python\
$cmd_duration\
$status\
$shell\
$time\
$username\
$line_break\
$character\
"""

palette = 'tokyo_night'
add_newline = true

[palettes.tokyo_night]
foreground = '#CFD8FF'
background = '#1F2335'
current_line = '#3B4261'
primary = '#1A1B26'
box = '#3B4261'
blue = '#7DA6FF'
cyan = '#8FE3FF'
green = '#A9E069'
orange = '#FFA86B'
pink = '#D2A6FF'
purple = '#B780F5'
red = '#FF7A93'
yellow = '#FFCB6B'

[os]
format = '(fg:current_line)[оӮ¶](fg:red)[$symbol ](fg:primary bg:red)[оӮҙ](fg:red)'
disabled = true

[os.symbols]
Alpine = 'пҢҖ'
Amazon = 'пү°'
Android = 'оңҺ'
Arch = 'пҢғ'
CentOS = 'пҢ„'
Debian = 'пҢҶ'
EndeavourOS = 'пҢў'
Fedora = 'пҢҠ'
FreeBSD = 'пҢҢ'
Garuda = 'п…ј'
Gentoo = 'пҢҚ'
Linux = 'п…ј'
Macos = 'пҢӮ'
Manjaro = 'пҢ’'
Mariner = 'п…ј'
Mint = 'пҢҺ'
NetBSD = 'п…ј'
NixOS = 'пҢ“'
OpenBSD = 'пҢЁ'
OpenCloudOS = 'о®Ә'
openEuler = 'п…ј'
openSUSE = 'пҢ”'
OracleLinux = 'вҠӮвҠғ'
Pop = 'пҢӘ'
Raspbian = 'пҢ•'
Redhat = 'пҢ–'
RedHatEnterprise = 'пҢ–'
Solus = 'пҢӯ'
SUSE = 'пҢ”'
Ubuntu = 'пҢӣ'
Unknown = 'п„Ҳ'
Windows = 'оңҸ'

[directory]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:pink)[у°·Ҹ ](fg:primary bg:pink)[оӮҙ](fg:pink bg:box)[ $read_only$truncation_symbol$path](fg:foreground bg:box)[оӮҙ](fg:box)'
home_symbol = "оӯҶ ~/"
truncation_length = 3
truncate_to_repo = true
read_only = 'уұ§ө '
read_only_style = ''

[git_branch]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $branch](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'пҗ— '

[git_status]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:cyan)[п‘ҷ ](fg:primary bg:cyan)[оӮҙ](fg:cyan bg:box)[ $ahead_behind$staged$modified$untracked$deleted$conflicted ](fg:foreground bg:box)[оӮҙ](fg:box)'

# The Indicators
staged = '[+$count](fg:green bg:box) '
modified = '[!$count](fg:yellow bg:box) '
conflicted = '[~$count](fg:red bg:box) '

# Ahead/Behind Remote (already in your format string)
ahead = '[вҮЎ$count](fg:foreground bg:box) '
behind = '[вҮЈ$count](fg:foreground bg:box) '

[python]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оңј python'

[fill]
symbol = 'в”Җ'
style = 'fg:current_line'

[cmd_duration]
min_time = 500
format = '[в”Җ](fg:current_line)[оӮ¶](fg:orange)[пғ§ ](fg:primary bg:orange)[оӮҙ](fg:orange bg:box)[ $duration ](fg:foreground bg:box)[оӮҙ](fg:box)'

[status]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:red)[пҖҚ ](fg:primary bg:red)[оӮҙ](fg:red bg:box)[ $status](fg:foreground bg:box)[оӮҙ](fg:box)'
disabled = false

[shell]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:blue)[п’ү ](fg:primary bg:blue)[оӮҙ](fg:blue bg:box)[ $indicator](fg:foreground bg:box)[оӮҙ](fg:box)'
unknown_indicator = 'shell'
powershell_indicator = 'powershell'
fish_indicator = 'fish'
disabled = false

[time]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:purple)[у°Ұ– ](fg:primary bg:purple)[оӮҙ](fg:purple bg:box)[ $time](fg:foreground bg:box)[оӮҙ](fg:box)'
time_format = '%H:%M'
disabled = false

[username]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:yellow)[пҗ• ](fg:primary bg:yellow)[оӮҙ](fg:yellow bg:box)[ $user](fg:foreground bg:box)[оӮҙ](fg:box) '
show_always = false

[character]
format = """
[в•°в”Җ$symbol](fg:current_line) """
success_symbol = '[О»](fg:bold white)'
error_symbol = '[Г—](fg:bold red)'
